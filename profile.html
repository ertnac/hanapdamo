<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanap Damo - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'leaf-dark': '#243b27',
                        'leaf': '#4a7553',
                        'leaf-light': '#dce7df',
                        'earth': '#f5f6f2',
                        'accent': '#d66a43'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        .tap-effect:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }

        .page-enter {
            animation: fadeSlide 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .shadow-soft {
            box-shadow: 0 10px 30px -5px rgba(36, 59, 39, 0.08);
        }

        .toggle-dot {
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
    </style>
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center py-10 font-sans">

    <!-- Device Frame -->
    <div
        class="relative w-[393px] h-[852px] bg-earth rounded-[50px] overflow-hidden shadow-2xl border-[8px] border-black flex flex-col page-enter">

        <!-- Status Bar -->
        <div
            class="absolute top-0 w-full flex justify-between items-center px-8 pt-4 z-50 text-[15px] font-semibold tracking-tight text-white pointer-events-none">
            <span>9:41</span>
            <div class="flex space-x-2 items-center"><i class="fas fa-signal text-xs"></i><i
                    class="fas fa-wifi text-xs"></i><i class="fas fa-battery-full text-sm"></i></div>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar pb-32">

            <!-- Header Section -->
            <div class="bg-gradient-to-br from-leaf-dark to-leaf pt-16 pb-16 px-6 relative rounded-b-[40px] shadow-lg">
                <div class="flex justify-between items-center mb-6 text-white">
                    <h1 class="font-bold text-2xl">Profile</h1>
                    <button
                        class="tap-effect w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/20">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>

                <div class="flex items-center gap-5">
                    <div class="relative">
                        <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white/20 shadow-xl bg-white">
                            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80"
                                alt="Profile" class="w-full h-full object-cover">
                        </div>
                        <div
                            class="absolute bottom-0 right-0 w-7 h-7 bg-accent rounded-full border-2 border-leaf flex items-center justify-center text-white">
                            <i class="fas fa-pen text-[10px]"></i>
                        </div>
                    </div>
                    <div class="text-white">
                        <h2 class="font-bold text-2xl leading-none">SDNP</h2>
                        <p class="text-[11px] text-leaf-light/70 font-medium mt-2">Member since Feb 2026</p>
                        <div
                            class="bg-white/10 border border-white/10 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider mt-3 flex items-center gap-2 backdrop-blur-sm">
                            <i class="fas fa-medal text-yellow-400"></i> Herbal Apprentice
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dashboard Stats -->
            <div class="px-6 -mt-8 relative z-10 space-y-6">
                <div
                    class="bg-white rounded-[28px] p-5 shadow-soft flex justify-around items-center border border-white">
                    <div class="text-center tap-effect cursor-pointer">
                        <p class="text-2xl font-bold text-leaf-dark">42</p>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">Total Scans</p>
                    </div>
                    <div class="w-px h-10 bg-gray-100"></div>
                    <div class="text-center tap-effect cursor-pointer">
                        <p class="text-2xl font-bold text-leaf-dark">18</p>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">Found Species</p>
                    </div>
                    <div class="w-px h-10 bg-gray-100"></div>
                    <div class="text-center tap-effect cursor-pointer">
                        <p class="text-2xl font-bold text-leaf-dark">7</p>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">Saved Items</p>
                    </div>
                </div>

                <!-- Settings Groups -->
                <div class="space-y-6">
                    <div>
                        <h3 class="text-[11px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-3 ml-2">Preferences
                        </h3>
                        <div class="bg-white rounded-[28px] shadow-soft border border-white overflow-hidden">
                            <div
                                class="flex justify-between items-center p-5 border-b border-gray-50 tap-effect cursor-pointer">
                                <div class="flex items-center gap-4">
                                    <div
                                        class="w-9 h-9 rounded-2xl bg-leaf-light/50 text-leaf flex items-center justify-center">
                                        <i class="fas fa-globe text-sm"></i>
                                    </div>
                                    <span class="text-sm font-semibold text-gray-700">App Language</span>
                                </div>
                                <div class="flex items-center gap-2 text-gray-400">
                                    <span class="text-xs font-bold">Taglish</span>
                                    <i class="fas fa-chevron-right text-[10px]"></i>
                                </div>
                            </div>
                            <div class="flex justify-between items-center p-5">
                                <div class="flex items-center gap-4">
                                    <div
                                        class="w-9 h-9 rounded-2xl bg-accent/10 text-accent flex items-center justify-center">
                                        <i class="far fa-bell text-sm"></i>
                                    </div>
                                    <div>
                                        <span class="block text-sm font-semibold text-gray-700">Daily Tip</span>
                                        <span class="block text-[10px] text-gray-400 font-medium">Herbal knowledge
                                            alerts</span>
                                    </div>
                                </div>
                                <div class="w-10 h-6 bg-leaf rounded-full relative cursor-pointer tap-effect transition-colors"
                                    onclick="toggleSwitch(this)">
                                    <div
                                        class="toggle-dot w-5 h-5 bg-white rounded-full absolute top-0.5 left-0.5 transform translate-x-4 shadow-sm">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-[11px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-3 ml-2">Security &
                            Data</h3>
                        <div class="bg-white rounded-[28px] shadow-soft border border-white overflow-hidden">
                            <div
                                class="flex justify-between items-center p-5 border-b border-gray-50 tap-effect cursor-pointer">
                                <div class="flex items-center gap-4">
                                    <div
                                        class="w-9 h-9 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center">
                                        <i class="fas fa-file-export text-sm"></i>
                                    </div>
                                    <span class="text-sm font-semibold text-gray-700">Export History</span>
                                </div>
                                <i class="fas fa-chevron-right text-[10px] text-gray-300"></i>
                            </div>
                            <div class="flex justify-between items-center p-5 tap-effect cursor-pointer">
                                <div class="flex items-center gap-4">
                                    <div
                                        class="w-9 h-9 rounded-2xl bg-red-50 text-red-500 flex items-center justify-center">
                                        <i class="far fa-trash-alt text-sm"></i>
                                    </div>
                                    <span class="text-sm font-semibold text-red-500">Clear Data</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button
                        class="w-full bg-white border border-gray-100 text-leaf-dark font-bold rounded-2xl py-4 shadow-soft tap-effect flex items-center justify-center gap-3"
                        onclick="window.location.href='index.html'">
                        <i class="fas fa-sign-out-alt text-gray-300"></i> Log Out
                    </button>

                    <p class="text-center text-[10px] text-gray-400 font-bold uppercase tracking-widest pb-10">Hanap
                        Damo v1.0 • San Pablo City</p>
                </div>
            </div>
        </div>

        <!-- Floating Modern Bottom Navigation -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[90%] z-40">
            <div
                class="bg-white/90 backdrop-blur-xl shadow-[0_20px_40px_-10px_rgba(36,59,39,0.15)] rounded-full h-16 flex justify-around items-center px-2 border border-white">
                <a href="home.html"
                    class="tap-effect flex flex-col items-center flex-1 text-gray-400 hover:text-leaf transition">
                    <i class="fas fa-home text-lg"></i>
                </a>
                <a href="library.html"
                    class="tap-effect flex flex-col items-center flex-1 text-gray-400 hover:text-leaf transition">
                    <i class="fas fa-book-open text-lg"></i>
                </a>

                <div class="relative flex-1 flex justify-center">
                    <a href="scan.html"
                        class="tap-effect absolute -top-10 w-16 h-16 bg-gradient-to-tr from-leaf-dark to-leaf rounded-full shadow-[0_10px_20px_rgba(74,117,83,0.3)] flex items-center justify-center border-4 border-earth cursor-pointer">
                        <i class="fas fa-camera text-white text-xl"></i>
                    </a>
                </div>

                <a href="history.html"
                    class="tap-effect flex flex-col items-center flex-1 text-gray-400 hover:text-leaf transition">
                    <i class="fas fa-history text-lg"></i>
                </a>
                <a href="profile.html" class="tap-effect flex flex-col items-center flex-1 text-leaf-dark">
                    <i class="fas fa-user text-xl"></i>
                    <div class="w-1 h-1 bg-leaf-dark mt-1 rounded-full"></div>
                </a>
            </div>
        </div>

        <!-- iPhone Home Indicator -->
        <div
            class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[120px] h-[5px] bg-gray-300 rounded-full z-[60] pointer-events-none">
        </div>
    </div>

    <script>
        function toggleSwitch(element) {
            const isOff = element.classList.contains('bg-gray-200');
            const dot = element.querySelector('.toggle-dot');
            if (isOff) {
                element.classList.replace('bg-gray-200', 'bg-leaf');
                dot.classList.add('translate-x-4');
            } else {
                element.classList.replace('bg-leaf', 'bg-gray-200');
                dot.classList.remove('translate-x-4');
            }
        }
    </script>
</body>

</html>
