<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanap Damo - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'leaf-dark': '#243b27',
                        'leaf': '#4a7553',
                        'leaf-light': '#dce7df',
                        'earth': '#f5f6f2',
                        'accent': '#d66a43'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .tap-effect:active { transform: scale(0.97); transition: transform 0.1s; }

        @keyframes moveLogoUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-220px); } /* Pushes logo higher to avoid cover-up */
        }
        @keyframes shrinkLogo {
            0% { transform: scale(1.3); }
            100% { transform: scale(0.8); }
        }
        @keyframes slideSheetUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-container { animation: moveLogoUp 1s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards; }
        .animate-logo { animation: shrinkLogo 1s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards; transform: scale(1.3); }
        .animate-sheet { animation: slideSheetUp 1s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards; transform: translateY(100%); }
        .fade-in-text { opacity: 0; animation: fadeIn 0.8s ease-out 2s forwards; }

        .loader {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%; width: 20px; height: 20px;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center py-10 font-sans">

    <!-- Device Frame -->
    <div class="relative w-[393px] h-[852px] bg-earth rounded-[50px] overflow-hidden shadow-2xl border-[8px] border-black">
        
        <!-- Status Bar -->
        <div class="absolute top-0 w-full flex justify-between items-center px-8 pt-4 z-50 text-[15px] font-semibold tracking-tight text-leaf-dark">
            <span>9:41</span>
            <div class="flex space-x-2 items-center">
                <i class="fas fa-signal text-xs"></i><i class="fas fa-wifi text-xs"></i><i class="fas fa-battery-full text-sm"></i>
            </div>
        </div>

        <!-- Logo Section -->
        <div class="absolute inset-x-0 top-0 h-[90%] flex flex-col items-center justify-center z-10 animate-container">
            <div class="w-40 h-40 rounded-full flex items-center justify-center relative animate-logo shadow-xl bg-white border-4 border-leaf-light p-1">
                <img src="hanapdamo.png" alt="Logo" class="w-full h-full object-cover rounded-full">
            </div>
            <h1 class="text-leaf-dark text-3xl mt-4 font-serif font-bold fade-in-text">
                Hanap Damo
            </h1>
        </div>

        <!-- Login Sheet (Height reduced to 62% to prevent overlap) -->
        <div class="absolute inset-x-0 bottom-0 h-[65%] bg-white rounded-t-[40px] px-8 pt-6 pb-10 flex flex-col z-20 animate-sheet shadow-[0_-15px_40px_rgba(36,59,39,0.12)]">
            
            <!-- Handle bar -->
            <div class="w-12 h-1 bg-leaf-light/60 rounded-full mx-auto mb-6"></div>
            
            <div class="mb-5">
                <p class="text-leaf font-bold text-[10px] uppercase tracking-[0.2em] mb-1">Welcome back</p>
                <h2 class="text-3xl font-serif font-bold text-leaf-dark leading-tight">Log In</h2>
            </div>

            <form class="flex flex-col flex-1">
                <!-- Inputs (Reduced spacing) -->
                <div class="space-y-3 mb-5">
                    <div class="relative">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-leaf/40 text-sm">
                            <i class="far fa-envelope"></i>
                        </span>
                        <input type="email" placeholder="Email Address" value="hanapkayo@gmail.com"
                            class="w-full bg-earth rounded-2xl py-4 pl-12 pr-6 text-[13px] outline-none text-gray-700 focus:ring-1 focus:ring-leaf/30 transition font-medium">
                    </div>

                    <div class="relative">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-leaf/40 text-sm">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="pwdInput" placeholder="Password" value="password123"
                            class="w-full bg-earth rounded-2xl py-4 pl-12 pr-14 text-[13px] outline-none text-gray-700 focus:ring-1 focus:ring-leaf/30 transition font-medium tracking-widest">
                        <button type="button" onclick="togglePwd()" class="absolute right-4 top-1/2 -translate-y-1/2 text-leaf/50 tap-effect p-2">
                            <i class="far fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="button" onclick="doLogin(this)"
                    class="tap-effect w-full bg-leaf-dark text-white rounded-2xl py-4 font-semibold shadow-lg shadow-leaf-dark/20 hover:bg-leaf transition relative h-[56px] flex items-center justify-center">
                    <span id="btnText">Continue</span>
                    <div class="loader" id="btnLoader"></div>
                </button>

                <!-- Divider -->
                <div class="flex items-center my-5">
                    <div class="flex-grow h-[1px] bg-gray-100"></div>
                    <span class="px-4 text-[9px] text-gray-400 font-bold uppercase tracking-widest">or connect with</span>
                    <div class="flex-grow h-[1px] bg-gray-100"></div>
                </div>

                <!-- Social Buttons -->
                <div class="flex gap-3 mb-6">
                    <button type="button" class="tap-effect flex-1 flex items-center justify-center gap-2 bg-white border border-gray-100 py-3 rounded-2xl shadow-sm hover:bg-gray-50 transition">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4">
                        <span class="text-[11px] font-bold text-gray-600">Google</span>
                    </button>
                    <button type="button" class="tap-effect flex-1 flex items-center justify-center gap-2 bg-white border border-gray-100 py-3 rounded-2xl shadow-sm hover:bg-gray-50 transition">
                        <i class="fab fa-apple text-base"></i>
                        <span class="text-[11px] font-bold text-gray-600">Apple</span>
                    </button>
                </div>

                <!-- Footer Link (Pushed to bottom using mt-auto) -->
                <div class="mt-auto text-center">
                    <p class="text-[12px] text-gray-500 font-medium">
                        New to the garden? 
                        <a href="register.html" class="text-accent font-bold hover:underline ml-1">Sign up here</a>
                    </p>
                </div>
            </form>
        </div>

        <!-- Home Indicator -->
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[120px] h-[5px] bg-gray-200 rounded-full z-50"></div>
    </div>

    <script>
        function togglePwd() {
            const input = document.getElementById('pwdInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash');
                input.classList.remove('tracking-widest');
            } else {
                input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye');
                input.classList.add('tracking-widest');
            }
        }

        function doLogin(btn) {
            document.getElementById('btnText').style.display = 'none';
            document.getElementById('btnLoader').style.display = 'block';
            setTimeout(() => { window.location.href = 'home.html'; }, 1000);
        }
    </script>
</body>

</html>
