<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuHALAMAN - Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { 'leaf-dark': '#243b27', 'leaf': '#4a7553', 'leaf-light': '#dce7df', 'earth': '#f5f6f2', 'accent': '#d66a43' }, fontFamily: { sans: ['Poppins', 'sans-serif'], serif: ['Playfair Display', 'serif'] } } } }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        .tap-effect:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }

        .page-enter {
            animation: fadeSlide 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .shadow-soft {
            box-shadow: 0 10px 30px -5px rgba(36, 59, 39, 0.08);
        }
    </style>
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center py-10 font-sans">

    <!-- Device Frame -->
    <div
        class="relative w-[393px] h-[852px] bg-earth rounded-[50px] overflow-hidden shadow-2xl border-[8px] border-black flex flex-col page-enter">

        <!-- Status Bar -->
        <div
            class="absolute top-0 w-full flex justify-between items-center px-8 pt-4 z-50 text-[15px] font-semibold tracking-tight text-gray-800 pointer-events-none">
            <span>9:41</span>
            <div class="flex space-x-2 items-center"><i class="fas fa-signal text-xs"></i><i
                    class="fas fa-wifi text-xs"></i><i class="fas fa-battery-full text-sm"></i></div>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar pb-32">

            <!-- Header Section -->
            <div class="pt-16 pb-2 px-6 relative z-20">
                <div class="mb-6">
                    <p class="text-leaf font-bold text-[10px] uppercase tracking-[0.2em] mb-1">Knowledge Base</p>
                    <h1 class="text-leaf-dark font-serif font-bold text-3xl">Plant Library</h1>
                </div>

                <!-- Search Bar -->
                <div class="relative focus-within:scale-[1.02] transition-transform mb-6">
                    <input type="text"
                        class="w-full bg-white rounded-full py-4 pl-6 pr-12 text-[13px] outline-none text-gray-700 placeholder-gray-400 shadow-soft font-medium"
                        placeholder="Search herbal plants...">
                    <button
                        class="absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 bg-leaf-light text-leaf-dark rounded-full flex items-center justify-center tap-effect">
                        <i class="fas fa-search text-xs"></i>
                    </button>
                </div>

                <!-- NEW: Compare Plants Banner -->
                <div class="bg-leaf-dark rounded-[24px] p-4 flex justify-between items-center text-white shadow-soft tap-effect cursor-pointer mb-6"
                    onclick="window.location.href='compare.html'">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-sm border border-white/20">
                            <i class="fas fa-columns"></i></div>
                        <div>
                            <h3 class="text-sm font-serif font-bold tracking-wide">Plant Comparison</h3>
                            <p class="text-[10px] text-white/70 font-medium">Verify similarities side-by-side</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-white/50 text-xs"></i>
                </div>
            </div>

            <!-- Library Grid -->
            <div class="px-6 space-y-4">
                <div class="flex justify-between items-center px-1">
                    <h3 class="font-semibold text-gray-800 tracking-tight text-sm">Herbal Species</h3>
                    <button class="text-leaf text-[11px] font-bold uppercase tracking-wider">Filter <i
                            class="fas fa-sliders-h ml-1"></i></button>
                </div>

                <div class="grid grid-cols-2 gap-4">

                    <!-- Card 1 (Links to plant-details.html) -->
                    <div class="bg-white rounded-[28px] p-2.5 shadow-soft border border-white/50 relative cursor-pointer tap-effect group"
                        onclick="window.location.href='plant-details.html'">
                        <div class="w-full h-36 rounded-[22px] overflow-hidden">
                            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBzIHpk8kLFkY-fK8ZgU9Ukz_LZicGRSFVWQ&s"
                                class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        </div>
                        <div class="pt-3 px-1 flex justify-between items-end">
                            <div>
                                <h3 class="text-leaf-dark font-serif font-bold text-base leading-none">Lagundi</h3>
                                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider mt-2">Cough & Cold
                                </p>
                            </div>
                            <button
                                class="w-8 h-8 bg-leaf-light text-leaf-dark rounded-full flex items-center justify-center group-hover:bg-leaf group-hover:text-white transition">
                                <i class="fas fa-arrow-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Card 2 -->
                    <div class="bg-white rounded-[28px] p-2.5 shadow-soft border border-white/50 relative cursor-pointer tap-effect group"
                        onclick="window.location.href='plant-details.html'">
                        <div class="w-full h-36 rounded-[22px] overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80"
                                class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        </div>
                        <div class="pt-3 px-1 flex justify-between items-end">
                            <div>
                                <h3 class="text-leaf-dark font-serif font-bold text-base leading-none">Tsaang Gubat</h3>
                                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider mt-2">Stomach Ache
                                </p>
                            </div>
                            <button
                                class="w-8 h-8 bg-leaf-light text-leaf-dark rounded-full flex items-center justify-center group-hover:bg-leaf group-hover:text-white transition">
                                <i class="fas fa-arrow-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Card 3 -->
                    <div class="bg-white rounded-[28px] p-2.5 shadow-soft border border-white/50 relative cursor-pointer tap-effect group"
                        onclick="window.location.href='plant-details.html'">
                        <div class="w-full h-36 rounded-[22px] overflow-hidden">
                            <img src="https://www.pchrd.dost.gov.ph/wp-content/uploads/2022/04/tsaanggubat2.jpg"
                                class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        </div>
                        <div class="pt-3 px-1 flex justify-between items-end">
                            <div>
                                <h3 class="text-leaf-dark font-serif font-bold text-base leading-none">Sambong</h3>
                                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider mt-2">Kidney Stone
                                </p>
                            </div>
                            <button
                                class="w-8 h-8 bg-leaf-light text-leaf-dark rounded-full flex items-center justify-center group-hover:bg-leaf group-hover:text-white transition">
                                <i class="fas fa-arrow-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Card 4 -->
                    <div class="bg-white rounded-[28px] p-2.5 shadow-soft border border-white/50 relative cursor-pointer tap-effect group"
                        onclick="window.location.href='plant-details.html'">
                        <div class="w-full h-36 rounded-[22px] overflow-hidden">
                            <img src="https://www.upm.edu.ph/wp-content/uploads/2024/09/Ampalaya1-scaled.jpg"
                                class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        </div>
                        <div class="pt-3 px-1 flex justify-between items-end">
                            <div>
                                <h3 class="text-leaf-dark font-serif font-bold text-base leading-none">Ampalaya</h3>
                                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider mt-2">Diabetes</p>
                            </div>
                            <button
                                class="w-8 h-8 bg-leaf-light text-leaf-dark rounded-full flex items-center justify-center group-hover:bg-leaf group-hover:text-white transition">
                                <i class="fas fa-arrow-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Floating Modern Bottom Navigation -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[90%] z-40">
            <div
                class="bg-white/90 backdrop-blur-xl shadow-[0_20px_40px_-10px_rgba(36,59,39,0.15)] rounded-full h-16 flex justify-around items-center px-2 border border-white">
                <a href="home.html"
                    class="tap-effect flex flex-col items-center flex-1 text-gray-400 hover:text-leaf transition"><i
                        class="fas fa-home text-lg"></i></a>
                <a href="library.html" class="tap-effect flex flex-col items-center flex-1 text-leaf-dark"><i
                        class="fas fa-book-open text-xl"></i>
                    <div class="w-1 h-1 bg-leaf-dark mt-1 rounded-full"></div>
                </a>
                <div class="relative flex-1 flex justify-center">
                    <a href="scan.html"
                        class="tap-effect absolute -top-10 w-16 h-16 bg-gradient-to-tr from-leaf-dark to-leaf rounded-full shadow-[0_10px_20px_rgba(74,117,83,0.3)] flex items-center justify-center border-4 border-earth cursor-pointer"><i
                            class="fas fa-camera text-white text-xl"></i></a>
                </div>
                <a href="history.html"
                    class="tap-effect flex flex-col items-center flex-1 text-gray-400 hover:text-leaf transition"><i
                        class="fas fa-history text-lg"></i></a>
                <a href="profile.html"
                    class="tap-effect flex flex-col items-center flex-1 text-gray-400 hover:text-leaf transition"><i
                        class="far fa-user text-lg"></i></a>
            </div>
        </div>
        <!-- iPhone Home Indicator -->
        <div
            class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[120px] h-[5px] bg-gray-300 rounded-full z-[60] pointer-events-none">
        </div>
    </div>
</body>

</html>
