<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanap Damo - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Restored Poppins and Playfair Display fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'leaf-dark': '#243b27',
                        'leaf': '#4a7553',
                        'leaf-light': '#dce7df',
                        'earth': '#f5f6f2',
                        'accent': '#d66a43'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'], // Poppins as the only font
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        .tap-effect:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }

        .page-enter {
            animation: fadeSlide 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom soft shadows */
        .shadow-soft {
            shadow: 0 10px 30px -5px rgba(36, 59, 39, 0.08);
        }
    </style>
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center py-10 font-sans">

    <!-- Device Frame with 'earth' background -->
    <div
        class="relative w-[393px] h-[852px] bg-earth rounded-[50px] overflow-hidden shadow-2xl border-[8px] border-black flex flex-col page-enter">

        <!-- Status Bar -->
        <div
            class="absolute top-0 w-full flex justify-between items-center px-8 pt-4 z-50 text-[15px] font-semibold tracking-tight text-gray-800 pointer-events-none">
            <span>9:41</span>
            <div class="flex space-x-2 items-center"><i class="fas fa-signal text-xs"></i><i
                    class="fas fa-wifi text-xs"></i><i class="fas fa-battery-full text-sm"></i></div>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar pb-32">

            <!-- 1. Header -->
            <div class="pt-16 pb-4 px-6 relative z-20">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-3 tap-effect cursor-pointer"
                        onclick="window.location.href='profile.html'">
                        <div class="w-12 h-12 rounded-full overflow-hidden shadow-sm bg-white">
                            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80"
                                alt="Profile" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <p class="text-gray-500 text-[11px] font-medium tracking-wide uppercase" id="greetingText">
                                Good morning,</p>
                            <!-- Elegant Serif for the name -->
                            <h1 class="text-leaf-dark font-semibold text-2xl leading-tight">SDNP</h1>
                        </div>
                    </div>
                    <button
                        class="tap-effect w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-500 shadow-sm relative">
                        <i class="far fa-bell"></i>
                        <span
                            class="absolute top-2.5 right-2.5 w-2 h-2 bg-accent rounded-full border border-white"></span>
                    </button>
                </div>

                <!-- Search Bar -->
                <div class="relative focus-within:scale-[1.02] transition-transform">
                    <input type="text"
                        class="w-full bg-white rounded-full py-4 pl-6 pr-12 text-[13px] outline-none text-gray-700 placeholder-gray-400 shadow-soft font-medium"
                        placeholder="Search herbal plants...">
                    <button
                        class="absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 bg-leaf-light text-leaf-dark rounded-full flex items-center justify-center tap-effect"><i
                            class="fas fa-search text-xs"></i></button>
                </div>
            </div>

            <div class="px-6 space-y-8 relative z-10">
                <!-- 3. Categories / Quick Access -->
                <div class="flex justify-between gap-3">
                    <div
                        class="flex-1 bg-white rounded-[24px] py-4 px-2 text-center shadow-soft tap-effect cursor-pointer transition">
                        <div
                            class="w-10 h-10 mx-auto bg-leaf-light/50 rounded-full flex items-center justify-center text-leaf-dark mb-2">
                            <i class="fas fa-mortar-pestle"></i>
                        </div>
                        <p class="text-[10px] font-semibold text-gray-700">Prep</p>
                    </div>
                    <div
                        class="flex-1 bg-white rounded-[24px] py-4 px-2 text-center shadow-soft tap-effect cursor-pointer transition">
                        <div
                            class="w-10 h-10 mx-auto bg-red-50 rounded-full flex items-center justify-center text-accent mb-2">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <p class="text-[10px] font-semibold text-gray-700">Safety</p>
                    </div>
                    <div class="flex-1 bg-white rounded-[24px] py-4 px-2 text-center shadow-soft tap-effect cursor-pointer transition"
                        onclick="window.location.href='symptoms.html'">
                        <div
                            class="w-10 h-10 mx-auto bg-blue-50 rounded-full flex items-center justify-center text-blue-600 mb-2">
                            <i class="fas fa-stethoscope"></i>
                        </div>
                        <p class="text-[10px] font-semibold text-gray-700">Symptoms</p>
                    </div>
                </div>

                <!-- 4. Featured Content (Plant of the Day) -->
                <div>
                    <div class="flex justify-between items-end mb-3">
                        <h3 class="font-semibold text-gray-800 tracking-tight text-sm">Featured Discovery</h3>
                    </div>
                    <div
                        class="tap-effect relative w-full h-56 rounded-[32px] overflow-hidden shadow-soft cursor-pointer group">
                        <img src="https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                            alt="Plant"
                            class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-leaf-dark/90 via-leaf-dark/30 to-transparent p-6 flex flex-col justify-end">
                            <h3 class="text-white font-semibold text-2xl leading-tight">Tsaang Gubat</h3>
                            <p class="text-white/80 text-[11px] w-5/6 mb-4 font-medium mt-1">Soothes abdominal pain
                                natively.</p>
                            <button
                                class="bg-white/20 backdrop-blur-md text-white border border-white/30 text-[10px] font-semibold py-2 px-5 rounded-full w-max tap-effect">
                                Read Guide
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 5. Recent Scans -->
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-semibold text-gray-800 tracking-tight text-sm">Recent Scans</h3>
                        <a href="history.html" class="text-leaf font-semibold text-[11px] tap-effect">See All</a>
                    </div>

                    <div class="space-y-3">
                        <div
                            class="tap-effect bg-white rounded-[24px] p-3 flex gap-4 items-center shadow-soft cursor-pointer">
                            <img src="https://www.pchrd.dost.gov.ph/wp-content/uploads/2022/04/tsaanggubat2.jpg"
                                class="w-14 h-14 rounded-2xl object-cover shadow-sm">
                            <div class="flex-1">
                                <h4 class="text-leaf-dark font-semibold text-sm">Tsaang Gubat</h4>
                                <p class="text-gray-400 text-[10px] mt-0.5 font-medium">Scanned Today</p>
                            </div>
                            <div class="w-8 h-8 rounded-full bg-earth flex items-center justify-center text-leaf"><i
                                    class="fas fa-chevron-right text-[10px]"></i></div>
                        </div>
                        <div
                            class="tap-effect bg-white rounded-[24px] p-3 flex gap-4 items-center shadow-soft cursor-pointer">
                            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBzIHpk8kLFkY-fK8ZgU9Ukz_LZicGRSFVWQ&s"
                                class="w-14 h-14 rounded-2xl object-cover shadow-sm">
                            <div class="flex-1">
                                <h4 class="text-leaf-dark font-semibold text-sm">Lagundi</h4>
                                <p class="text-gray-400 text-[10px] mt-0.5 font-medium">Scanned Yesterday</p>
                            </div>
                            <div class="w-8 h-8 rounded-full bg-earth flex items-center justify-center text-leaf"><i
                                    class="fas fa-chevron-right text-[10px]"></i></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Floating Modern Bottom Navigation -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[90%] z-40">
            <div
                class="bg-white/90 backdrop-blur-xl shadow-[0_20px_40px_-10px_rgba(36,59,39,0.15)] rounded-full h-16 flex justify-around items-center px-2 border border-white">

                <a href="home.html" class="tap-effect flex flex-col items-center flex-1 text-leaf-dark"><i
                        class="fas fa-home text-xl"></i>
                    <div class="w-1 h-1 bg-leaf-dark mt-1 rounded-full"></div>
                </a>
                <a href="library.html"
                    class="tap-effect flex flex-col items-center flex-1 text-gray-400 hover:text-leaf transition"><i
                        class="fas fa-book-open text-lg"></i></a>

                <div class="relative flex-1 flex justify-center">
                    <a href="scan.html"
                        class="tap-effect absolute -top-10 w-16 h-16 bg-gradient-to-tr from-leaf-dark to-leaf rounded-full shadow-[0_10px_20px_rgba(74,117,83,0.3)] flex items-center justify-center border-4 border-earth cursor-pointer">
                        <i class="fas fa-camera text-white text-xl"></i>
                    </a>
                </div>

                <a href="history.html"
                    class="tap-effect flex flex-col items-center flex-1 text-gray-400 hover:text-leaf transition"><i
                        class="fas fa-history text-lg"></i></a>
                <a href="profile.html"
                    class="tap-effect flex flex-col items-center flex-1 text-gray-400 hover:text-leaf transition"><i
                        class="far fa-user text-lg"></i></a>
            </div>
        </div>

        <!-- iPhone Home Indicator -->
        <div
            class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[120px] h-[5px] bg-gray-300 rounded-full z-[60] pointer-events-none">
        </div>
    </div>

    <script>
        const hour = new Date().getHours();
        let greeting = "Good evening,";
        if (hour >= 5 && hour < 12) greeting = "Good morning,";
        else if (hour >= 12 && hour < 18) greeting = "Good afternoon,";
        document.getElementById('greetingText').innerText = greeting;
    </script>
</body>

</html>
